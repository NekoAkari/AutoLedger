name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build AutoLedger
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build App
        run: |
          xcodebuild \
          -project AutoLedger.xcodeproj \
          -scheme AutoLedger \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          -configuration Debug \
          build
