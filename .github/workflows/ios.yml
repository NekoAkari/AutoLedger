name: iOS Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "AutoLedger/**"
      - "AutoLedger.xcodeproj/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "AutoLedger/**"
      - "AutoLedger.xcodeproj/**"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build AutoLedger
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build App
        run: |
          xcodebuild \
          -project AutoLedger.xcodeproj \
          -scheme AutoLedger \
          -destination 'platform=iOS Simulator,OS=latest,name=iPhone 15' \
          -configuration Debug \
          build
